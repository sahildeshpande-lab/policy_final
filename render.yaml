services:
  - type: web
    name: policy-final
    env: python
    plan: free

    buildCommand: pip install --no-cache-dir -r requirements.txt

    startCommand: streamlit run app.py --server.port=$PORT --server.address=0.0.0.0 --server.headless=true

    envVars:
      - key: PYTHON_VERSION
        value: 3.11